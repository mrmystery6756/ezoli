<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup 2026 Sweepstake</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #68b9e6;
        color: #092f6e;
      }
      .page {
        max-width: 1400px;
        margin: 0 auto;
        padding: 1rem;
      }
      h1,
      h2,
      h3 {
        margin: 0;
      }
      .header {
        text-align: center;
        margin-bottom: 1rem;
      }
      .header p {
        margin-top: 0.5rem;
      }
      .auth-panel {
        max-width: 480px;
        margin: 0 auto 1rem;
      }
      .auth-status {
        margin-top: 0.75rem;
        font-weight: 700;
        text-align: center;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        justify-content: center;
        margin: 1rem 0;
      }
      button {
        border: none;
        border-radius: 8px;
        padding: 0.6rem 1rem;
        font-weight: 700;
        cursor: pointer;
      }
      .primary {
        background: #0f397f;
        color: white;
      }
      .secondary {
        background: #e7effc;
        color: #0f397f;
        border: 1px solid #bfd2f4;
      }
      .danger {
        background: #ca2f4e;
        color: white;
      }
      .info {
        font-weight: 700;
        text-align: center;
      }
      .layout {
        display: grid;
        gap: 1rem;
      }
      .panel {
        background: rgba(255, 255, 255, 0.92);
        border-radius: 12px;
        padding: 1rem;
        box-shadow: 0 8px 22px rgba(7, 40, 92, 0.15);
      }
      .reference {
        margin-bottom: 1rem;
      }
      .reference-image {
        display: block;
        width: 100%;
        max-width: 1100px;
        margin: 0.75rem auto 0;
        border-radius: 10px;
        border: 1px solid #d7e5f7;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border-bottom: 1px solid #d8e4f7;
        padding: 0.45rem;
        text-align: left;
      }
      th {
        color: #0f397f;
      }
      .draw-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
        gap: 0.3rem;
        margin-top: 0.5rem;
      }
      .draw-item {
        display: flex;
        flex-direction: column;
        background: #edf4ff;
        border: 1px solid #d4e3f8;
        border-radius: 6px;
        padding: 0.28rem 0.5rem;
        font-size: 0.82rem;
        line-height: 1.35;
      }
      .draw-team {
        font-weight: 700;
        color: #092f6e;
      }
      .draw-owner {
        color: #3a5a9f;
      }
      .bracket-columns {
        --bracket-column-gap: 1rem;
        --round-gap-r0: 0.6rem;
        --round-gap-r1: 0.95rem;
        --round-gap-r2: 1.25rem;
        --round-gap-r3: 1.55rem;
        --round-gap-r4: 1.9rem;
        --round-gap-r5: 0.75rem;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(230px, 1fr);
        gap: var(--bracket-column-gap);
        overflow-x: auto;
        padding: 0.35rem 0.4rem 0.8rem;
        align-items: start;
      }
      .round {
        background: linear-gradient(180deg, #f7fbff 0%, #edf4ff 100%);
        border: 1px solid #d4e3f8;
        border-radius: 12px;
        padding: 0.7rem;
      }
      .round h3 {
        font-size: 0.88rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #0f397f;
        margin-bottom: 0.55rem;
      }
      .round-matches {
        display: grid;
        gap: var(--round-gap-r0);
      }
      .round.round-1 .round-matches {
        gap: var(--round-gap-r1);
      }
      .round.round-2 .round-matches {
        gap: var(--round-gap-r2);
      }
      .round.round-3 .round-matches {
        gap: var(--round-gap-r3);
      }
      .round.round-4 .round-matches {
        gap: var(--round-gap-r4);
      }
      .round.round-5 .round-matches {
        gap: var(--round-gap-r5);
      }
      .match {
        position: relative;
        border: 1px solid #dbe8fa;
        border-radius: 10px;
        padding: 0.5rem;
        background: white;
        box-shadow: 0 3px 12px rgba(9, 47, 110, 0.08);
      }
      .round:not(:last-child) .match::after {
        content: "";
        position: absolute;
        right: calc(var(--bracket-column-gap) * -1);
        top: 50%;
        width: var(--bracket-column-gap);
        border-top: 2px solid #b8cdef;
      }
      .match h3 {
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: #5a76a8;
      }
      .match-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 56px;
        gap: 0.45rem;
        margin-top: 0.35rem;
      }
      .match-row input,
      .winner select,
      .field,
      .auth-panel input {
        width: 100%;
        padding: 0.55rem;
        border: 1px solid #c6d8f4;
        border-radius: 6px;
        box-sizing: border-box;
      }
      .read-only input,
      .read-only select {
        background: #ffffff;
        color: #092f6e;
        opacity: 1;
      }
      .read-only select option {
        color: #092f6e;
      }
      .field-group {
        display: grid;
        gap: 0.75rem;
        margin-top: 0.75rem;
      }
      .winner {
        margin-top: 0.4rem;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      [hidden] {
        display: none !important;
      }
      @media (max-width: 980px) {
        .bracket-columns {
          grid-auto-flow: row;
          grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
          grid-auto-columns: unset;
          overflow-x: visible;
        }
        .round:not(:last-child) .match::after {
          display: none;
        }
      }
      .round0-stage {
        margin-bottom: 1rem;
      }
      @media (min-width: 1080px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .round0-stage .round-matches {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <h1>World Cup 2026 Sweepstake</h1>
      </div>

      <div class="layout">
        <section class="panel" aria-labelledby="team-draw-heading">
          <h2 id="team-draw-heading">Team Draw</h2>
          <div id="drawGrid" class="draw-grid" role="list" aria-label="Team draw assignments"></div>
        </section>

        <section class="panel" aria-labelledby="knockout-bracket-heading">
          <h2 id="knockout-bracket-heading">Knockout Bracket</h2>
          <div id="round0" class="round0-stage"></div>
          <div id="bracket" class="bracket-columns"></div>
        </section>
      </div>

      <p id="modeText" class="info">Loading shared bracket data…</p>

      <section class="panel auth-panel" aria-labelledby="updates-heading">
        <h2 id="updates-heading">Updates</h2>
        <p>This page now reads shared sweepstake data from <code>world-cup-data.json</code>.</p>
        <p>Edit that file in GitHub to publish score or bracket updates for everyone.</p>
        <p id="dataStatus" class="auth-status" role="status" aria-live="polite">Loading shared bracket data…</p>
      </section>
    </div>

    <script>
      const DATA_FILE_NAME = "world-cup-data.json";

      const defaultAssignments = [
        ["Mexico", "Alec"], ["South Korea", "Liam Spence"], ["Canada", "James Steers"], ["Qatar", "James Steers"],
        ["Brazil", "Brenden"], ["Haiti", "Treats"], ["USA", "James Steers"], ["Australia", "Jess"],
        ["Germany", "Rory"], ["Côte d'Ivoire", "Getley"], ["Netherlands", "Sam"], ["Sweden", "John G"],
        ["Belgium", "Getley"], ["IR Iran", "Bryce"], ["Spain", "Oli"], ["Saudi Arabia", "Rory"],
        ["France", "Bryce"], ["Iraq", "Sam"], ["Argentina", "Liam Spence"], ["Austria", "Jlamb"],
        ["Portugal", "Leon"], ["Uzbekistan", "Liam Spence"], ["England", "Kane"], ["Ghana", "Leon"],
        ["South Africa", "Getley"], ["Czechia", "Liam Studd"], ["Bosnia-Herzegovina", "Kane"], ["Switzerland", "Leon"],
        ["Morocco", "Jlamb"], ["Scotland", "Alec"], ["Paraguay", "Brenden"], ["Türkiye", "Alec"],
        ["Curaçao", "Treats"], ["Ecuador", "Sam"], ["Japan", "Rory"], ["Tunisia", "Oli"],
        ["Egypt", "Oli"], ["New Zealand", "Treats"], ["Cabo Verde", "Jlamb"], ["Uruguay", "Brenden"],
        ["Senegal", "John G"], ["Norway", "John G"], ["Algeria", "Kane"], ["Jordan", "Jess"],
        ["Congo DR", "Bryce"], ["Colombia", "Liam Studd"], ["Croatia", "Jess"], ["Panama", "Liam Studd"]
      ].map(([team, owner]) => ({ team, owner }));

      const roundConfig = [
        ["Round of 48", 72],
        ["Round of 24", 12],
        ["Round of 12", 6],
        ["Quarter Finals", 4],
        ["Semi Finals", 2],
        ["Final", 1]
      ];

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatTeamLabel(teamName) {
        const cleanTeamName = String(teamName ?? "").trim();
        if (!cleanTeamName) {
          return "";
        }
        const teamOwnerMap = Object.fromEntries(
          state.assignments.map(({ team, owner }) => [team, owner])
        );
        const owner = teamOwnerMap[cleanTeamName];
        return owner ? `${cleanTeamName} (${owner})` : cleanTeamName;
      }

      function generateDefaultBracket(assignments) {
        let currentRoundTeams = assignments.map((entry) => entry.team);
        const rounds = roundConfig.map(([name, matchCount], roundIndex) => {
          const matches = [];
          for (let i = 0; i < matchCount; i++) {
            const teamA = currentRoundTeams[i * 2] || "";
            const teamB = currentRoundTeams[i * 2 + 1] || "";
            matches.push({
              teamA,
              teamB,
              scoreA: "",
              scoreB: "",
              winner: ""
            });
          }
          currentRoundTeams = Array(matchCount).fill("");
          return { id: roundIndex, name, matches };
        });
        return rounds;
      }

      function migrateRounds(rounds) {
        return rounds.map((round, roundIndex) => {
          const configEntry = roundConfig[roundIndex];
          if (!configEntry) return round;
          const expectedCount = configEntry[1];
          if (round.matches.length >= expectedCount) return round;
          const matches = [...round.matches];
          while (matches.length < expectedCount) {
            matches.push({ teamA: "", teamB: "", scoreA: "", scoreB: "", winner: "" });
          }
          return { ...round, matches };
        });
      }

      function cloneAssignments(assignments) {
        return assignments.map(({ team, owner }) => ({ team, owner }));
      }

      function createDefaultState() {
        const assignments = cloneAssignments(defaultAssignments);
        return {
          assignments,
          rounds: generateDefaultBracket(assignments)
        };
      }

      function normalizeAssignments(assignments) {
        if (!Array.isArray(assignments) || assignments.length === 0) {
          return cloneAssignments(defaultAssignments);
        }
        return assignments.map((entry) => ({
          team: String(entry?.team ?? ""),
          owner: String(entry?.owner ?? "")
        }));
      }

      function normalizeRounds(rounds, assignments) {
        const defaultRounds = generateDefaultBracket(assignments);
        if (!Array.isArray(rounds)) {
          return defaultRounds;
        }
        return migrateRounds(
          defaultRounds.map((defaultRound, roundIndex) => {
            const round = rounds[roundIndex];
            if (!round || !Array.isArray(round.matches)) {
              return defaultRound;
            }

            return {
              id: defaultRound.id,
              name: String(round.name ?? defaultRound.name),
              matches: defaultRound.matches.map((defaultMatch, matchIndex) => {
                const match = round.matches[matchIndex];
                if (!match) {
                  return defaultMatch;
                }
                return {
                  teamA: String(match.teamA ?? defaultMatch.teamA ?? ""),
                  teamB: String(match.teamB ?? defaultMatch.teamB ?? ""),
                  scoreA: String(match.scoreA ?? ""),
                  scoreB: String(match.scoreB ?? ""),
                  winner: String(match.winner ?? "")
                };
              })
            };
          })
        );
      }

      function normalizeState(data) {
        const assignments = normalizeAssignments(data?.assignments);
        return {
          assignments,
          rounds: normalizeRounds(data?.rounds, assignments)
        };
      }

      async function loadData() {
        try {
          const response = await fetch(DATA_FILE_NAME, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Request failed with status ${response.status}`);
          }
          const parsed = await response.json();
          return {
            state: normalizeState(parsed),
            usingFallback: false
          };
        } catch {
          return {
            state: createDefaultState(),
            usingFallback: true
          };
        }
      }

      let state = {
        assignments: cloneAssignments(defaultAssignments),
        rounds: []
      };

      const drawGrid = document.getElementById("drawGrid");
      const round0El = document.getElementById("round0");
      const bracket = document.getElementById("bracket");
      const modeText = document.getElementById("modeText");
      const dataStatus = document.getElementById("dataStatus");

      function renderDraw() {
        drawGrid.innerHTML = state.assignments
          .map(
            ({ team, owner }) =>
              `<div class="draw-item" role="listitem"><span class="draw-team">${escapeHtml(team)}</span><span class="draw-owner">${escapeHtml(owner)}</span></div>`
          )
          .join("");
      }

      function winnerOptions(match) {
        return ["", match.teamA, match.teamB]
          .filter((team, index) => index === 0 || String(team).trim() !== "")
          .map((team) => {
            const selected = team === match.winner ? "selected" : "";
            const label = team ? formatTeamLabel(team) : "Select winner";
            return `<option value="${escapeHtml(team)}" ${selected}>${escapeHtml(label)}</option>`;
          })
          .join("");
      }

      function renderBracket() {
        bracket.classList.add("read-only");
        round0El.classList.add("read-only");

        const renderRoundHtml = (round, roundIndex) => {
          const matches = round.matches
            .map(
              (match, matchIndex) => `
                <div class="match" data-round="${roundIndex}" data-match="${matchIndex}">
                  <h3>Match ${matchIndex + 1}</h3>
                  <div class="match-row">
                    <div class="field"><span class="sr-only">${escapeHtml(round.name)} match ${matchIndex + 1} team A</span>${escapeHtml(formatTeamLabel(match.teamA))}</div>
                    <label class="sr-only" for="round-${roundIndex}-match-${matchIndex}-score-a">${escapeHtml(round.name)} match ${matchIndex + 1} score A</label>
                    <input id="round-${roundIndex}-match-${matchIndex}-score-a" data-field="scoreA" inputmode="numeric" value="${escapeHtml(match.scoreA)}" disabled />
                  </div>
                  <div class="match-row">
                    <div class="field"><span class="sr-only">${escapeHtml(round.name)} match ${matchIndex + 1} team B</span>${escapeHtml(formatTeamLabel(match.teamB))}</div>
                    <label class="sr-only" for="round-${roundIndex}-match-${matchIndex}-score-b">${escapeHtml(round.name)} match ${matchIndex + 1} score B</label>
                    <input id="round-${roundIndex}-match-${matchIndex}-score-b" data-field="scoreB" inputmode="numeric" value="${escapeHtml(match.scoreB)}" disabled />
                  </div>
                  <div class="winner">
                    <label class="sr-only" for="round-${roundIndex}-match-${matchIndex}-winner">${escapeHtml(round.name)} match ${matchIndex + 1} winner</label>
                    <select id="round-${roundIndex}-match-${matchIndex}-winner" data-field="winner" disabled>
                      ${winnerOptions(match)}
                    </select>
                  </div>
                </div>`
            )
            .join("");
          return `<div class="round round-${round.id}"><h3>${escapeHtml(round.name)}</h3><div class="round-matches">${matches}</div></div>`;
        };

        round0El.innerHTML = state.rounds.length > 0 ? renderRoundHtml(state.rounds[0], 0) : "";

        bracket.innerHTML = state.rounds
          .slice(1)
          .map((round, idx) => renderRoundHtml(round, idx + 1))
          .join("");
      }

      function renderPage(message) {
        renderBracket();
        modeText.textContent = "Shared data mode: read-only";
        dataStatus.textContent = message;
      }

      async function initializePage() {
        const { state: loadedState, usingFallback } = await loadData();
        state = loadedState;
        renderDraw();
        renderPage(
          usingFallback
            ? `Could not load ${DATA_FILE_NAME}, so the built-in default bracket is being shown.`
            : `Showing shared bracket data from ${DATA_FILE_NAME}. Edit that file in GitHub to publish updates.`
        );
      }
      initializePage();
    </script>
  </body>
</html>
