<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup 2026 Sweepstake</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #68b9e6;
        color: #092f6e;
      }
      .page {
        max-width: 1400px;
        margin: 0 auto;
        padding: 1rem;
      }
      h1,
      h2,
      h3 {
        margin: 0;
      }
      .header {
        text-align: center;
        margin-bottom: 1rem;
      }
      .header p {
        margin-top: 0.5rem;
      }
      .auth-panel {
        max-width: 480px;
        margin: 0 auto 1rem;
      }
      .auth-status {
        margin-top: 0.75rem;
        font-weight: 700;
        text-align: center;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        justify-content: center;
        margin: 1rem 0;
      }
      button {
        border: none;
        border-radius: 8px;
        padding: 0.6rem 1rem;
        font-weight: 700;
        cursor: pointer;
      }
      .primary {
        background: #0f397f;
        color: white;
      }
      .secondary {
        background: #e7effc;
        color: #0f397f;
        border: 1px solid #bfd2f4;
      }
      .danger {
        background: #ca2f4e;
        color: white;
      }
      .info {
        font-weight: 700;
        text-align: center;
      }
      .layout {
        display: grid;
        gap: 1rem;
      }
      .panel {
        background: rgba(255, 255, 255, 0.92);
        border-radius: 12px;
        padding: 1rem;
        box-shadow: 0 8px 22px rgba(7, 40, 92, 0.15);
      }
      .reference {
        margin-bottom: 1rem;
      }
      .reference-image {
        display: block;
        width: 100%;
        max-width: 1100px;
        margin: 0.75rem auto 0;
        border-radius: 10px;
        border: 1px solid #d7e5f7;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        border-bottom: 1px solid #d8e4f7;
        padding: 0.45rem;
        text-align: left;
      }
      th {
        color: #0f397f;
      }
      .bracket-columns {
        --bracket-column-gap: 1rem;
        --round-gap-r0: 0.6rem;
        --round-gap-r1: 0.95rem;
        --round-gap-r2: 1.25rem;
        --round-gap-r3: 1.55rem;
        --round-gap-r4: 1.9rem;
        --round-gap-r5: 0.75rem;
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(230px, 1fr);
        gap: var(--bracket-column-gap);
        overflow-x: auto;
        padding: 0.35rem 0.4rem 0.8rem;
        align-items: start;
      }
      .round {
        background: linear-gradient(180deg, #f7fbff 0%, #edf4ff 100%);
        border: 1px solid #d4e3f8;
        border-radius: 12px;
        padding: 0.7rem;
      }
      .round h3 {
        font-size: 0.88rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #0f397f;
        margin-bottom: 0.55rem;
      }
      .round-matches {
        display: grid;
        gap: var(--round-gap-r0);
      }
      .round.round-1 .round-matches {
        gap: var(--round-gap-r1);
      }
      .round.round-2 .round-matches {
        gap: var(--round-gap-r2);
      }
      .round.round-3 .round-matches {
        gap: var(--round-gap-r3);
      }
      .round.round-4 .round-matches {
        gap: var(--round-gap-r4);
      }
      .round.round-5 .round-matches {
        gap: var(--round-gap-r5);
      }
      .match {
        position: relative;
        border: 1px solid #dbe8fa;
        border-radius: 10px;
        padding: 0.5rem;
        background: white;
        box-shadow: 0 3px 12px rgba(9, 47, 110, 0.08);
      }
      .round:not(:last-child) .match::after {
        content: "";
        position: absolute;
        right: calc(var(--bracket-column-gap) * -1);
        top: 50%;
        width: var(--bracket-column-gap);
        border-top: 2px solid #b8cdef;
      }
      .match h3 {
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: #5a76a8;
      }
      .match-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 56px;
        gap: 0.45rem;
        margin-top: 0.35rem;
      }
      .match-row input,
      .winner select,
      .field,
      .auth-panel input {
        width: 100%;
        padding: 0.55rem;
        border: 1px solid #c6d8f4;
        border-radius: 6px;
        box-sizing: border-box;
      }
      .read-only input,
      .read-only select {
        background: #ffffff;
        color: #092f6e;
        opacity: 1;
      }
      .read-only select option {
        color: #092f6e;
      }
      .field-group {
        display: grid;
        gap: 0.75rem;
        margin-top: 0.75rem;
      }
      .winner {
        margin-top: 0.4rem;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      [hidden] {
        display: none !important;
      }
      @media (max-width: 980px) {
        .bracket-columns {
          grid-auto-flow: row;
          grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
          grid-auto-columns: unset;
          overflow-x: visible;
        }
        .round:not(:last-child) .match::after {
          display: none;
        }
      }
      @media (min-width: 1080px) {
        .layout {
          grid-template-columns: 1fr 1.5fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <h1>World Cup 2026 Sweepstake</h1>
      </div>

      <section class="panel auth-panel" aria-labelledby="admin-login-heading">
        <h2 id="admin-login-heading">Admin access</h2>
        <form id="loginForm">
          <div class="field-group">
            <div>
              <label for="username">Username</label>
              <input id="username" name="username" type="text" autocomplete="username" required />
            </div>
            <div>
              <label for="password">Password</label>
              <input id="password" name="password" type="password" autocomplete="current-password" required />
            </div>
          </div>
          <div class="toolbar">
            <button type="submit" class="primary">Sign in as admin</button>
            <button type="button" id="logout" class="secondary" hidden>Sign out</button>
          </div>
        </form>
        <p id="authStatus" class="auth-status" role="status" aria-live="polite">Admin mode is off.</p>
      </section>

      <div class="toolbar" aria-label="Bracket actions">
        <button id="save" class="primary" hidden>Save Changes</button>
        <button id="reset" class="danger" hidden>Reset to Default</button>
      </div>
      <p id="modeText" class="info">View mode: locked</p>

      <div class="layout">
        <section class="panel" aria-labelledby="team-draw-heading">
          <h2 id="team-draw-heading">Team Draw</h2>
          <table>
            <thead>
              <tr>
                <th scope="col">Team</th>
                <th scope="col">Name</th>
              </tr>
            </thead>
            <tbody id="drawTable"></tbody>
          </table>
        </section>

        <section class="panel" aria-labelledby="knockout-bracket-heading">
          <h2 id="knockout-bracket-heading">Knockout Bracket</h2>
          <div id="bracket" class="bracket-columns"></div>
        </section>
      </div>
    </div>

    <script>
      const STORAGE_KEY = "worldCupSweepstakeData";
      const ADMIN_SESSION_KEY = "worldCupSweepstakeAdminSession";
      const ADMIN_CREDENTIALS = {
        username: "admin",
        password: "BWIT-CLN3362"
      };

      const defaultAssignments = [
        ["Mexico", "Alec"], ["South Korea", "Liam Spence"], ["Canada", "James Steers"], ["Qatar", "James Steers"],
        ["Brazil", "Brenden"], ["Haiti", "Treats"], ["USA", "James Steers"], ["Australia", "Jess"],
        ["Germany", "Rory"], ["Côte d'Ivoire", "Getley"], ["Netherlands", "Sam"], ["Sweden", "John G"],
        ["Belgium", "Getley"], ["IR Iran", "Bryce"], ["Spain", "Oli"], ["Saudi Arabia", "Rory"],
        ["France", "Bryce"], ["Iraq", "Sam"], ["Argentina", "Liam Spence"], ["Austria", "Jlamb"],
        ["Portugal", "Leon"], ["Uzbekistan", "Liam Spence"], ["England", "Kane"], ["Ghana", "Leon"],
        ["South Africa", "Getley"], ["Czechia", "Liam Studd"], ["Bosnia-Herzegovina", "Kane"], ["Switzerland", "Leon"],
        ["Morocco", "Jlamb"], ["Scotland", "Alec"], ["Paraguay", "Brenden"], ["Türkiye", "Alec"],
        ["Curaçao", "Treats"], ["Ecuador", "Sam"], ["Japan", "Rory"], ["Tunisia", "Oli"],
        ["Egypt", "Oli"], ["New Zealand", "Treats"], ["Cabo Verde", "Jlamb"], ["Uruguay", "Brenden"],
        ["Senegal", "John G"], ["Norway", "John G"], ["Algeria", "Kane"], ["Jordan", "Jess"],
        ["Congo DR", "Bryce"], ["Colombia", "Liam Studd"], ["Croatia", "Jess"], ["Panama", "Liam Studd"]
      ].map(([team, owner]) => ({ team, owner }));

      const teamOwnerMap = Object.fromEntries(
        defaultAssignments.map(({ team, owner }) => [team, owner])
      );

      const roundConfig = [
        ["Round of 48", 24],
        ["Round of 24", 12],
        ["Round of 12", 6],
        ["Quarter Finals", 4],
        ["Semi Finals", 2],
        ["Final", 1]
      ];

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatTeamLabel(teamName) {
        const cleanTeamName = String(teamName ?? "").trim();
        if (!cleanTeamName) {
          return "";
        }
        const owner = teamOwnerMap[cleanTeamName];
        return owner ? `${cleanTeamName} (${owner})` : cleanTeamName;
      }

      function generateDefaultBracket(assignments) {
        let currentRoundTeams = assignments.map((entry) => entry.team);
        const rounds = roundConfig.map(([name, matchCount], roundIndex) => {
          const matches = [];
          for (let i = 0; i < matchCount; i++) {
            const teamA = currentRoundTeams[i * 2] || "";
            const teamB = currentRoundTeams[i * 2 + 1] || "";
            matches.push({
              teamA,
              teamB,
              scoreA: "",
              scoreB: "",
              winner: ""
            });
          }
          currentRoundTeams = Array(matchCount).fill("");
          return { id: roundIndex, name, matches };
        });
        return rounds;
      }

      function loadData() {
        const fallback = {
          assignments: defaultAssignments,
          rounds: generateDefaultBracket(defaultAssignments)
        };
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return fallback;
          const parsed = JSON.parse(raw);
          if (!parsed?.assignments || !parsed?.rounds) return fallback;
          return parsed;
        } catch {
          return fallback;
        }
      }

      function saveData(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function readAdminSession() {
        return localStorage.getItem(ADMIN_SESSION_KEY) === "true";
      }

      function writeAdminSession(isEnabled) {
        localStorage.setItem(ADMIN_SESSION_KEY, isEnabled ? "true" : "false");
      }

      let state = loadData();
      let adminMode = readAdminSession();

      const drawTable = document.getElementById("drawTable");
      const bracket = document.getElementById("bracket");
      const modeText = document.getElementById("modeText");
      const saveBtn = document.getElementById("save");
      const resetBtn = document.getElementById("reset");
      const loginForm = document.getElementById("loginForm");
      const logoutBtn = document.getElementById("logout");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const authStatus = document.getElementById("authStatus");

      function renderDraw() {
        drawTable.innerHTML = state.assignments
          .map(
            ({ team, owner }) =>
              `<tr><td>${escapeHtml(team)}</td><td>${escapeHtml(owner)}</td></tr>`
          )
          .join("");
      }

      function winnerOptions(match) {
        return ["", match.teamA, match.teamB]
          .filter((team, index) => index === 0 || String(team).trim() !== "")
          .map((team) => {
            const selected = team === match.winner ? "selected" : "";
            const label = team ? formatTeamLabel(team) : "Select winner";
            return `<option value="${escapeHtml(team)}" ${selected}>${escapeHtml(label)}</option>`;
          })
          .join("");
      }

      function getAvailableTeams() {
        return new Set(
          state.assignments
            .map(({ team }) => String(team ?? "").trim())
            .filter((team) => team !== "")
        );
      }

      function teamOptions(selectedTeam, availableTeams, baseOptionValues) {
        const selected = String(selectedTeam ?? "").trim();
        const options = [...baseOptionValues];
        if (selected && !availableTeams.has(selected)) {
          options.push(selected);
        }
        return options
          .map((team) => {
            const isSelected = team === selected ? "selected" : "";
            const label = team ? formatTeamLabel(team) : "Select team";
            return `<option value="${escapeHtml(team)}" ${isSelected}>${escapeHtml(label)}</option>`;
          })
          .join("");
      }

      function renderBracket() {
        bracket.classList.toggle("read-only", !adminMode);
        const availableTeams = getAvailableTeams();
        const baseTeamOptionValues = ["", ...availableTeams];

        bracket.innerHTML = state.rounds
          .map((round, roundIndex) => {
            const matches = round.matches
              .map(
                (match, matchIndex) => `
                <div class="match" data-round="${roundIndex}" data-match="${matchIndex}">
                  <h3>Match ${matchIndex + 1}</h3>
                  <div class="match-row">
                    ${adminMode
                      ? `<label class="sr-only" for="round-${roundIndex}-match-${matchIndex}-team-a">${escapeHtml(round.name)} match ${matchIndex + 1} select team A</label>
                    <select id="round-${roundIndex}-match-${matchIndex}-team-a" data-field="teamA">
                      ${teamOptions(match.teamA, availableTeams, baseTeamOptionValues)}
                    </select>`
                      : `<div class="field"><span class="sr-only">${escapeHtml(round.name)} match ${matchIndex + 1} team A </span>${escapeHtml(formatTeamLabel(match.teamA))}</div>`}
                    <label class="sr-only" for="round-${roundIndex}-match-${matchIndex}-score-a">${escapeHtml(round.name)} match ${matchIndex + 1} score A</label>
                    <input id="round-${roundIndex}-match-${matchIndex}-score-a" data-field="scoreA" inputmode="numeric" value="${escapeHtml(match.scoreA)}" ${adminMode ? "" : "disabled"} />
                  </div>
                  <div class="match-row">
                    ${adminMode
                      ? `<label class="sr-only" for="round-${roundIndex}-match-${matchIndex}-team-b">${escapeHtml(round.name)} match ${matchIndex + 1} select team B</label>
                    <select id="round-${roundIndex}-match-${matchIndex}-team-b" data-field="teamB">
                      ${teamOptions(match.teamB, availableTeams, baseTeamOptionValues)}
                    </select>`
                      : `<div class="field"><span class="sr-only">${escapeHtml(round.name)} match ${matchIndex + 1} team B </span>${escapeHtml(formatTeamLabel(match.teamB))}</div>`}
                    <label class="sr-only" for="round-${roundIndex}-match-${matchIndex}-score-b">${escapeHtml(round.name)} match ${matchIndex + 1} score B</label>
                    <input id="round-${roundIndex}-match-${matchIndex}-score-b" data-field="scoreB" inputmode="numeric" value="${escapeHtml(match.scoreB)}" ${adminMode ? "" : "disabled"} />
                  </div>
                  <div class="winner">
                    <label class="sr-only" for="round-${roundIndex}-match-${matchIndex}-winner">${escapeHtml(round.name)} match ${matchIndex + 1} winner</label>
                    <select id="round-${roundIndex}-match-${matchIndex}-winner" data-field="winner" ${adminMode ? "" : "disabled"}>
                      ${winnerOptions(match)}
                    </select>
                  </div>
                </div>`
              )
              .join("");

            return `<div class="round round-${round.id}"><h3>${escapeHtml(round.name)}</h3><div class="round-matches">${matches}</div></div>`;
          })
          .join("");
      }

      function captureInputs() {
        document.querySelectorAll(".match").forEach((matchEl) => {
          const r = Number(matchEl.dataset.round);
          const m = Number(matchEl.dataset.match);
          if (!state.rounds[r] || !state.rounds[r].matches[m]) return;

          matchEl.querySelectorAll("[data-field]").forEach((input) => {
            const field = input.dataset.field;
            if (field === "teamA" || field === "teamB") {
              const rawValue = String(input.value ?? "").trim();
              const normalizedValue = rawValue.replace(/\s*\([^)]*\)\s*$/, "");
              state.rounds[r].matches[m][field] = normalizedValue;
              return;
            }
            state.rounds[r].matches[m][field] = input.value;
          });
        });
      }

      function syncAdvancingTeams() {
        for (let roundIndex = 0; roundIndex < state.rounds.length - 1; roundIndex++) {
          const currentRound = state.rounds[roundIndex];
          const nextRound = state.rounds[roundIndex + 1];
          nextRound.matches.forEach((nextMatch, nextMatchIndex) => {
            const winnerA = currentRound.matches[nextMatchIndex * 2]?.winner || "";
            const winnerB = currentRound.matches[nextMatchIndex * 2 + 1]?.winner || "";
            const teamsChanged = nextMatch.teamA !== winnerA || nextMatch.teamB !== winnerB;
            nextMatch.teamA = winnerA;
            nextMatch.teamB = winnerB;
            if (teamsChanged) {
              nextMatch.scoreA = "";
              nextMatch.scoreB = "";
            }
            if (nextMatch.winner && nextMatch.winner !== winnerA && nextMatch.winner !== winnerB) {
              nextMatch.winner = "";
            }
          });
        }
      }

      function updateAdminUi(message) {
        modeText.textContent = adminMode ? "Admin mode: editing enabled" : "View mode: locked";
        saveBtn.hidden = !adminMode;
        resetBtn.hidden = !adminMode;
        logoutBtn.hidden = !adminMode;
        usernameInput.disabled = adminMode;
        passwordInput.disabled = adminMode;
        loginForm.querySelector('button[type="submit"]').hidden = adminMode;
        authStatus.textContent = message || (adminMode ? "Signed in as admin." : "Admin mode is off.");
        renderBracket();
      }

      loginForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
          adminMode = true;
          writeAdminSession(true);
          passwordInput.value = "";
          updateAdminUi("Signed in as admin. Editing is now enabled.");
          saveBtn.focus();
          return;
        }
        adminMode = false;
        writeAdminSession(false);
        updateAdminUi("Incorrect admin username or password.");
      });

      logoutBtn.addEventListener("click", () => {
        if (adminMode) {
          captureInputs();
          syncAdvancingTeams();
        }
        adminMode = false;
        writeAdminSession(false);
        usernameInput.disabled = false;
        passwordInput.disabled = false;
        usernameInput.value = "";
        passwordInput.value = "";
        updateAdminUi("Signed out. Admin mode is off.");
        usernameInput.focus();
      });

      saveBtn.addEventListener("click", () => {
        captureInputs();
        syncAdvancingTeams();
        saveData(state);
        renderBracket();
        modeText.textContent = "Admin mode: editing enabled (changes saved)";
        authStatus.textContent = "Changes saved successfully.";
      });

      resetBtn.addEventListener("click", () => {
        if (!confirm("Reset all bracket values to default? This will permanently delete all saved progress.")) return;
        state = {
          assignments: defaultAssignments,
          rounds: generateDefaultBracket(defaultAssignments)
        };
        saveData(state);
        renderDraw();
        renderBracket();
        authStatus.textContent = "Bracket reset to default values.";
      });

      renderDraw();
      updateAdminUi(adminMode ? "Signed in as admin." : "Admin mode is off.");
    </script>
  </body>
</html>
